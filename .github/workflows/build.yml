name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build with Gradle
      run: ./gradlew build --no-daemon
      
    - name: Run tests
      run: ./gradlew test --no-daemon
      
    - name: Generate test report
      if: always()
      uses: dorny/test-reporter@v1
      with:
        name: Test Results
        path: build/test-results/test/*.xml
        reporter: java-junit
        fail-on-error: true
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: build/reports/tests/test/
        
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: VoidPlots-jar
        path: build/libs/*.jar
        
    - name: Check test coverage
      run: |
        echo "Test Summary:"
        cat build/test-results/test/*.xml | grep -o 'tests="[0-9]*"' | head -1
        cat build/test-results/test/*.xml | grep -o 'failures="[0-9]*"' | head -1
        cat build/test-results/test/*.xml | grep -o 'errors="[0-9]*"' | head -1
