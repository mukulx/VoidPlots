config-version: 1

# World Settings
world:
  name: "plotworld"
  generator: "plotx"
  
# Plot Settings
plot:
  size: 32
  road-width: 7
  border-blocks:
    - "STONE_BRICKS"
  road-blocks:
    - "OAK_PLANKS"
  fill-block: "GRASS_BLOCK"
  bottom-block: "BEDROCK"
  wall-height: 64
  
# Plot Limits
limits:
  max-plots-per-player: 3
  auto-claim-on-enter: false
  auto-claim-on-first-join: false
  
# Features
features:
  enable-plot-chat: true
  enable-plot-fly: true
  enable-world-border: true
  enable-ratings: true
  enable-comments: true
  enable-notifications: true
  
# Notifications
notifications:
  visit-notification: true
  trusted-online-notification: true
  play-sound: true
  sound: "ENTITY_EXPERIENCE_ORB_PICKUP"
  
# Database (SQLite by default)
database:
  type: "sqlite"
  file: "plots.db"
